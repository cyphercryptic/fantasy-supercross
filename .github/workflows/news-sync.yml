name: News Sync

on:
  schedule:
    # Once daily at 18:05 UTC (1 PM ET) Sunday through Friday — no racing those days
    - cron: "5 18 * * 0-5"
    # Hourly all day Saturday (race day) so injury news drops in fast
    - cron: "5 * * * 6"
  workflow_dispatch:

jobs:
  news-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Racer X news
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/news-sync")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::News sync returned status $HTTP_CODE"
          fi
